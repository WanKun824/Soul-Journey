version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soulcompass-web
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - soulcompass-network

networks:
  soulcompass-network:
    driver: bridge
